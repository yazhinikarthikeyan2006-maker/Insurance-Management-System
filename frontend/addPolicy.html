<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Policy</title>

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <h1>Add New Policy</h1>

            <form id="policyForm">

                <input
                    type="text"
                    id="policyName"
                    placeholder="Policy Name"
                    required
                >

                <input
                    type="text"
                    id="policyType"
                    placeholder="Policy Type"
                    required
                >

                <input
                    type="number"
                    id="premium"
                    placeholder="Premium Amount"
                    required
                >

                <input
                    type="number"
                    id="coverage"
                    placeholder="Coverage Amount"
                    required
                >

                <input
                    type="number"
                    id="duration"
                    placeholder="Duration (Years)"
                    required
                >

                <button type="submit">
                    Add Policy
                </button>

            </form>

            <br>

            <button onclick="window.location.href='dashboard.html'">
                ⬅ Back to Dashboard
            </button>

        </div>

    </div>

    <script src="./js/addPolicy.js"></script>

</body>

</html>
